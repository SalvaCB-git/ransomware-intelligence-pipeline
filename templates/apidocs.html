<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>API · Ransomware Intelligence Pipeline</title>
  <!-- Swagger UI por CDN (coherente con el stack sin build tooling del proyecto) -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swagger-ui-dist@5/swagger-ui.css">
  <style>
    body { margin: 0; background: #fafafa; }
    .ribbon {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #1d4ed8; color: #fff; padding: 8px 16px; font-size: 14px;
      display: flex; gap: 16px; align-items: center;
    }
    .ribbon a { color: #fff; text-decoration: none; opacity: .9; }
    .ribbon a:hover { opacity: 1; text-decoration: underline; }
    .ribbon .sep { opacity: .5; }
  </style>
</head>
<body>
  <div class="ribbon">
    <strong>Ransomware Intelligence Pipeline — API</strong>
    <span class="sep">·</span>
    <a href="/">← Panel</a>
    <a href="/demo">Demo</a>
    <a href="/static/openapi.yaml">openapi.yaml</a>
  </div>
  <div id="swagger-ui"></div>
  <script src="https://cdn.jsdelivr.net/npm/swagger-ui-dist@5/swagger-ui-bundle.js" crossorigin></script>
  <script src="https://cdn.jsdelivr.net/npm/swagger-ui-dist@5/swagger-ui-standalone-preset.js" crossorigin></script>
  <script>
    window.onload = function () {
      window.ui = SwaggerUIBundle({
        url: "/static/openapi.yaml",
        dom_id: "#swagger-ui",
        deepLinking: true,
        presets: [SwaggerUIBundle.presets.apis, SwaggerUIStandalonePreset],
        layout: "StandaloneLayout",
        defaultModelsExpandDepth: -1,
        docExpansion: "list"
      });
    };
  </script>
</body>
</html>
